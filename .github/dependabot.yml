version: 2
updates:
  # JS dependencies — weekly, batched
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      react-and-friends:
        patterns:
          - "react"
          - "react-dom"
          - "@vitejs/*"
          - "vite"
      leaflet-stack:
        patterns:
          - "leaflet"
          - "react-leaflet"
      capacitor:
        patterns:
          - "@capacitor/*"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions — keep up to date so workflows don't bit-rot
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
