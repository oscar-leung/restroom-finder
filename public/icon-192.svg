<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.7">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <rect width="192" height="192" rx="42" fill="url(#glow)"/>

  <!-- Speed lines (suggesting "gotta GO" urgency) -->
  <g opacity="0.45" stroke="white" stroke-linecap="round">
    <line x1="22" y1="55"  x2="48" y2="55"  stroke-width="5"/>
    <line x1="14" y1="76"  x2="50" y2="76"  stroke-width="5"/>
    <line x1="26" y1="97"  x2="46" y2="97"  stroke-width="5"/>
  </g>

  <!-- Lightning bolt — urgency mark -->
  <path d="M 134 32 L 110 88 L 130 88 L 116 132 L 152 70 L 130 70 Z"
        fill="white" opacity="0.9" filter="url(#shadow)"/>

  <!-- Bold "GG" wordmark -->
  <g font-family="system-ui, -apple-system, 'SF Pro Display', sans-serif" font-weight="900" fill="white" filter="url(#shadow)">
    <text x="58" y="158" font-size="76" letter-spacing="-4">GG</text>
  </g>
</svg>
