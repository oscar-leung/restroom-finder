<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed for adaptive icons; the 80% safe zone is centered -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Centered "GG" — sized for the maskable safe zone (≈ inner 410x410) -->
  <g font-family="system-ui, -apple-system, 'SF Pro Display', sans-serif" font-weight="900" fill="white">
    <text x="256" y="330" font-size="200" letter-spacing="-10" text-anchor="middle">GG</text>
  </g>
</svg>
