<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover → let our CSS safe-area insets work on notched iPhones -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />

    <!-- iOS: allow installing to home screen & hide browser chrome -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Gotta Go" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />

    <!-- Android: color scheme -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO / share preview -->
    <meta
      name="description"
      content="Gotta Go — the closest public bathroom, instantly. One tap. One button. One bathroom."
    />
    <meta property="og:title" content="Gotta Go — Closest bathroom, instantly" />
    <meta
      property="og:description"
      content="Open the app, tap GO, get to the nearest public bathroom. No accounts, no menus."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>Gotta Go — Closest bathroom, instantly</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
